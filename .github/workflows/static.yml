# Workflow: Unit Tests + Conditional Deployment to GitHub Pages
name: CI Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Run unit tests on every push ──────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install test dependencies
        run: cd tests && npm install

      - name: Run unit tests
        run: cd tests && npm test

  # ── Job 2: Deploy only on deploy: prefix (requires tests to pass) ─────────
  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: (startsWith(github.event.head_commit.message, 'deploy:') || github.event_name == 'workflow_dispatch') && needs.test.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
